<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="global.css">
</head>

<body>
    <nav>
        <a href="ageCalculator.html">Age Calculator</a> |
        <a href="bmiCalculator.html">BMI Calculator</a> |
        <a href="randomNamePicker.html">Random Name Picker</a> |

        <a href="simpleInterestCalculator.html">Simple Interest Calculator</a> |
        <a href="typingSpeedTest.html">Typing Speed Test</a> |
        <a href="wordCounter.html">Word Counter</a>
    </nav>
    <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center;">
        <h2 style="margin-top: 0;">Random Name Picker</h2>
        <div class="input-field" style="display: flex; flex-direction: column; width: 100%; max-width: 400px; gap: 15px;">
            <label for="name-list" style="font-weight: bold; font-size: 16px;">Enter names on separate lines:</label>
            <textarea style="resize: none; height: 150px;" id="name-list" placeholder="Alice&#10;Bob&#10;Charlie" required></textarea>
            <button onclick="namePicker()">Pick a Random Name</button>
        </div>
        <div class="result-box" style="width: 100%; max-width: 400px; margin-top: 10px;">
            <h3 style="margin: 0; font-size: 20px;">Selected Name: <span id="gen-name" style="font-weight: bold;"></span></h3>
        </div>
    </div>
    <script>
        function namePicker() {
            const nameList = document.getElementById("name-list").value;
            const names = nameList.split("\n");
            if (names.length <= 1) {
                alert("Please enter at least two name")
                return;
            }
            const randomIndex = Math.floor(Math.random() * names.length);
            const selectedName = names[randomIndex]
            document.getElementById("gen-name").textContent = selectedName;
        }
    </script>
</body>

</html>
