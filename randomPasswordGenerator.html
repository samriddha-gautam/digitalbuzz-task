<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <script>
        function generatePassword() {
            const length = document.getElementById("password-length").value;
            if (length < 4 || length > 16) {
                alert("Password length must be between 4 and 16 characters.");
                return;
            }
            const uppercaseChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lowercaseChars = "abcdefghijklmnopqrstuvwxyz";
            const symbols = "!@#$%^&*()_+<>,./?|{}[]=-'`~";
            const numbers = "0123456789";

            let password = "";
            let allChars = uppercaseChars + lowercaseChars + symbols + numbers;

            for (let i = 0; i < length; i++) {
                password += allChars.charAt(Math.floor(Math.random() * allChars.length));
            }

            document.getElementById("gen-password").textContent = password;

        }

    </script>
</head>

<body>
    <nav>
        <a href="ageCalculator.html">Age Calculator</a> |
        <a href="bmiCalculator.html">BMI Calculator</a> |
        <a href="randomNamePicker.html">Random Name Picker</a> |
        <a href="randomPasswordGenerator.html">Random Password Generator</a> |
        <a href="simpleInterestCalculator.html">Simple Interest Calculator</a> |
        <a href="typingSpeedTest.html">Typing Speed Test</a> |
        <a href="wordCounter.html">Word Counter</a>
    </nav>
    <div class="generator-card">
        <h1>Random Password Generator</h1>
        <div class="input-field">
            <label for="password-length">Password Length</label>
            <input type="number" id="password-length" placeholder="Enter password length" required>
            <button onclick="generatePassword()">Generate Password</button>
        </div>
        <div class="output">
            <h1>Generated Password:
                <span id="gen-password">
                </span>
            </h1>
        </div>
    </div>
</body>

</html>
